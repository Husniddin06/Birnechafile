<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Particles Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(ellipse at bottom, #01010f 0%, #000 100%);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: monospace;
    }

    h1 {
      position: relative;
      z-index: 2;
      color: #0ff;
      text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 15px #0ff,
        0 0 20px #0ff,
        0 0 35px #0ff;
      font-size: 3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: flicker 3s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      0% {
        text-shadow:
          0 0 5px #0ff,
          0 0 10px #0ff,
          0 0 15px #0ff,
          0 0 20px #0ff,
          0 0 35px #0ff;
      }
      50% {
        text-shadow:
          0 0 5px #0ff,
          0 0 10px #0ff,
          0 0 15px #0ff,
          0 0 20px #0ff,
          0 0 35px #0ff,
          0 0 50px #0ff;
      }
      100% {
        text-shadow:
          0 0 5px #0ff,
          0 0 10px #0ff,
          0 0 15px #0ff,
          0 0 20px #0ff,
          0 0 35px #0ff;
      }
    }

    /* Neon particles konteyner */
    .neon-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #0ff;
      border-radius: 50%;
      box-shadow:
        0 0 8px #0ff,
        0 0 16px #0ff,
        0 0 24px #0ff;
      animation: floatNeon 8s ease-in-out infinite;
    }

    /* Har bir particle uchun pozitsiya va delay */
    .particle:nth-child(1)  { top: 15%; left: 20%; animation-delay: 0.0s; }
    .particle:nth-child(2)  { top: 30%; left: 80%; animation-delay: 0.5s; }
    .particle:nth-child(3)  { top: 45%; left: 10%; animation-delay: 1.0s; }
    .particle:nth-child(4)  { top: 60%; left: 90%; animation-delay: 1.5s; }
    .particle:nth-child(5)  { top: 75%; left: 25%; animation-delay: 2.0s; }
    .particle:nth-child(6)  { top: 20%; left: 70%; animation-delay: 2.5s; }
    .particle:nth-child(7)  { top: 80%; left: 60%; animation-delay: 3.0s; }
    .particle:nth-child(8)  { top: 10%; left: 40%; animation-delay: 3.5s; }
    .particle:nth-child(9)  { top: 50%; left: 50%; animation-delay: 4.0s; }
    .particle:nth-child(10) { top: 35%; left: 30%; animation-delay: 4.5s; }

    /* neon yaltirash / float animatsiyasi */
    @keyframes floatNeon {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.5;
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
        opacity: 1;
      }
      100% {
        transform: translateY(0) rotate(360deg);
        opacity: 0.5;
      }
    }

    /* Agar RG neonlarni aralash qilmoqchi bo’lsang */
    .particle:nth-child(odd) {
      background: #0ff;
      box-shadow:
        0 0 8px #0ff,
        0 0 16px #0ff,
        0 0 24px #0ff;
    }

    .particle:nth-child(even) {
      background: #f00;
      box-shadow:
        0 0 8px #f00,
        0 0 16px #f00,
        0 0 24px #f00;
    }
  </style>
</head>
<body>
  <h1>NEON</h1>

  <div class="neon-particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>
</body>
</html>
